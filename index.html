<!DOCTYPE html>
<html lang="en">

<head>

    <title>The Floral Shop</title>

    <script defer src="./app.js"></script>

    <link rel="stylesheet" href="./style.css">

</head>

<body>
    <header>
        <div id="header-content">
            <div id="shop-banner">
                ~ The Floral Shop ~

                    <h2 id="game-state-modal">You Win!</h2>

                    <div id="stars-container">
