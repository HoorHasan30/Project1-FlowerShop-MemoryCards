<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Floral Shop</title>

    <script defer src="./app.js"></script>

    <link rel="stylesheet" href="./style.css">

</head>

<body>
    <header>
        <div id="header-content">
            <div id="shop-banner">
                ~ The Floral Shop ~
            </div>
            <div id="game-banner">
                <div id="timer" class="header-btn"><span id="time">30</span>s</div>
                <button id="pause" class="header-btn">❚❚</button>
            </div>
        </div>
    </header>

    <main>
        <div id="main-content">
            <!-- shop window -->
            <section id="shop-window">
                <div class="vases">
                    <div class="vases-row">
                        <img src="./assets/vases/Vempty.png" alt="Daisy Flower Vase" class="vase" id="daisy">
                        <img src="./assets/vases/Vempty.png" alt="Dan Flower Vase" class="vase" id="dan">
                        <img src="./assets/vases/Vempty.png" alt="Lavender Flower Vase" class="vase" id="lavender">
                    </div>
                    <img src="./assets/ui/shopBanner.png" class="shelf">
                </div>

                <div class="vases">
                    <div class="vases-row">
                        <img src="./assets/vases/Vempty.png" alt="Mix Flowers Vase"class="vase" id="mix">
                        <img src="./assets/vases/Vempty.png" alt="SunFlower" class="vase" id="sunflower">
                        <img src="./assets/vases/Vempty.png" alt="Tulip Flower" class="vase" id="tulip">
                    </div>
                    <img src="./assets/ui/shopBanner.png" class="shelf">
                </div>

            </section>

            <!-- cards -->
            <section id="cards">
                <div class="card flipped">
                    <div class="card-front">♡</div>
                    <div class="card-back">
                        <img src="" class="cardImg">
                    </div>
                </div>

                <div class="card">
                    <div class="card-front">♡</div>
                    <div class="card-back">
                        <img src="" class="cardImg">
                    </div>
                </div>

                <div class="card">
                    <div class="card-front">♡</div>
                    <div class="card-back">
                        <img src="" class="cardImg">
                    </div>
                </div>

                <div class="card">
                    <div class="card-front">♡</div>
                    <div class="card-back">
                        <img src="" class="cardImg">
                    </div>
                </div>

                <div class="card">
                    <div class="card-front">♡</div>
                    <div class="card-back">
                        <img src="" class="cardImg">
                    </div>
                </div>

                <div class="card">
                    <div class="card-front">♡</div>
                    <div class="card-back">
                        <img src="" class="cardImg">
                    </div>
                </div>

                <div class="card">
                    <div class="card-front">♡</div>
                    <div class="card-back">
                        <img src="" class="cardImg">
                    </div>
                </div>

                <div class="card">
                    <div class="card-front">♡</div>
                    <div class="card-back">
                        <img src="" class="cardImg">
                    </div>
                </div>

                <div class="card">
                    <div class="card-front">♡</div>
                    <div class="card-back">
                        <img src="" class="cardImg">
                    </div>
                </div>

                <div class="card">
                    <div class="card-front">♡</div>
                    <div class="card-back">
                        <img src="" class="cardImg">
                    </div>
                </div>

                <div class="card">
                    <div class="card-front">♡</div>
                    <div class="card-back">
                        <img src="" class="cardImg">
                    </div>
                </div>

                <div class="card">
                    <div class="card-front">♡</div>
                    <div class="card-back">
                        <img src="" class="cardImg">
                    </div>
                </div>
            </section>
        </div>

        <!-- Modal Container -->
        <div id="start-modal">
            <div id="start-content">
                <div id="start-text">
                    <div id="shop-banner">
                        ~ The Floral Shop ~
                    </div>
                </div>
                <button class="btn start-modal-btn" id="start">♡ Start</button>
                <button class="btn start-modal-btn score">♡ Score Board</button>
            </div>
        </div>

        <div class="modal" id="end-modal">
            <div class="modal-content">
                <div class="modal-text">
                    <h2 id="game-state-modal">You Win!</h2>

                    <div id="stars-container">
                        <p id="star-rating"></p>
                    </div>

                    <div id="end-details">
                        <p id="matches">~ <span id="numOfMatches">0</span>/6 Matches ~</p>
                        <p id="time-consumed">~ In <span id="numOfSec">0</span> Seconds ~</p>
                    </div>
                </div>
                <button class="btn" id="reset-modal">↻ Play Again</button>
                <button class="btn score">♡ Score Board</button>
                <button class="btn" id="exit-main">➜] Exit</button>
            </div>
        </div>

        <div class="modal" id="pause-modal">
            <div class="modal-content">
                <div class="modal-text">
                    <h2 class="title">~ Game Paused ~</h2>
                </div>
                <div class="btns">
                    <button class="btnP" id="resume">▶ Resume</button>
                    <button class="btnP" id="exit">➜] Exit</button>
                </div>
            </div>
        </div>

        <div class="modal" id="name-modal">
            <div id="name-content">
                <div class="modal-text">
                    <h2 class="title">~ Enter Your Name ~</h2>
                </div>
                <input type="text" id="name" name="name">
                <button class="btn" id="save">save</button>
            </div>
        </div>

        <div class="modal" id="score-modal">
            <div class="score-content">
                <div id="main-content-score">

                    <div class="modal-text">
                        <h2 class="title">~ Score Board ~</h2>
                    </div>

                    <div id="score-board">
                        <div class="data">
                            <div class="score-num"></div>
                            <div class="player"></div>
                            <div class="score-match"></div>
                            <div class="score-sec"></div>
                        </div>
                        <div class="data">
                            <div class="score-num"></div>
                            <div class="player"></div>
                            <div class="score-match"></div>
                            <div class="score-sec"></div>
                        </div>
                        <div class="data">
                            <div class="score-num"></div>
                            <div class="player"></div>
                            <div class="score-match"></div>
                            <div class="score-sec"></div>
                        </div>
                        <div class="data">
                            <div class="score-num"></div>
                            <div class="player"></div>
                            <div class="score-match"></div>
                            <div class="score-sec"></div>
                        </div>
                        <div class="data">
                            <div class="score-num"></div>
                            <div class="player"></div>
                            <div class="score-match"></div>
                            <div class="score-sec"></div>
                        </div>
                    </div>
                </div>

                <div class="exit-modal">
                    <button id="exit-modal-btn">➜] Exit</button>
                </div>

            </div>
        </div>


    </main>
</body>

</html>
