<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Floral Shop</title>

    <script defer src="./app.js"></script>

    <link rel="stylesheet" href="./style.css">

</head>

<body>

    <header>
        <div id="header-content">
            <div id="shop-banner">
                ~ The Floral Shop ~
            </div>
            <div id="timer">
                0:00
            </div>
        </div>

    </header>

    <main>
        <div id="main-content">

            <!-- shop window -->
            <section id="shop-window">
                <div class="vases-row">
                    <img src="./assets/vases/empty.png" class="vase">
                    <img src="./assets/vases/empty.png" class="vase">

                    <img src="./assets/vases/lavender.png" class="vase">
                </div>

                <div class="vases-row">
                    <img src="./assets/vases/empty.png" class="vase">
                    <img src="./assets/vases/empty.png" class="vase">
                    <img src="./assets/vases/lavender.png" class="vase">
                </div>
            </section>

            <!-- cards -->
            <section id="cards">
                <div class="card"></div>
                <div class="card"></div>
                <div class="card"></div>
                <div class="card"></div>

                <div class="card"></div>
                <div class="card"></div>
                <div class="card"></div>
                <div class="card"></div>

                <div class="card"></div>
                <div class="card"></div>
                <div class="card"></div>
                <div class="card"></div>
            </section>
        </div>
    </main>

</body>

</html>
